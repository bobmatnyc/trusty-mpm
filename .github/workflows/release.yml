name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: trusty-mpm
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: trusty-mpm
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: trusty-mpm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools
      - name: Build
        run: cargo build -p trusty-mpm-cli --release --target ${{ matrix.target }}
      - name: Archive
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../trusty-mpm-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ${{ matrix.binary }}
      - uses: softprops/action-gh-release@v2
        with:
          files: trusty-mpm-*.tar.gz

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish crates (in dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p trusty-mpm-core --no-verify
          sleep 30
          cargo publish -p trusty-mpm-mcp --no-verify
          sleep 30
          cargo publish -p trusty-mpm-daemon --no-verify
          sleep 30
          cargo publish -p trusty-mpm-tui --no-verify
          sleep 30
          cargo publish -p trusty-mpm-telegram --no-verify
          sleep 30
          # --no-default-features drops the optional `gui` dep: trusty-mpm-gui
          # is a path-only Tauri crate and is not published to crates.io.
          cargo publish -p trusty-mpm-cli --no-verify --no-default-features
