name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in as much detail as you can.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `trusty-mpm daemon`
        2. Run `trusty-mpm start`
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: trusty-mpm version
      placeholder: "trusty-mpm --version"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / Rust toolchain
      placeholder: "macOS 15, stable 1.87"
    validations:
      required: false
